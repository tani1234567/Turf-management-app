name: iOS Simulator Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Expo Prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Pod Install
        run: cd ios && pod install

      - name: Build for Simulator
        run: |
          xcodebuild \
            -workspace ios/PlayGrid.xcworkspace \
            -scheme PlayGrid \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath $RUNNER_TEMP/DerivedData \
            build

      - name: Zip .app
        run: |
          cd "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator"
          zip -r PlayGrid-simulator.zip PlayGrid.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayGrid-simulator
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/PlayGrid-simulator.zip
          retention-days: 3
