name: iOS Simulator Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Expo Prebuild (no pod install yet)
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Pod Install
        run: cd ios && pod install --repo-update

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Build for Simulator
        run: |
          xcodebuild \
            -workspace ios/PlayGrid.xcworkspace \
            -scheme PlayGrid \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            build \
            | xcpretty --color && exit ${PIPESTATUS[0]}

      - name: Zip .app
        run: |
          cd "$RUNNER_TEMP/DerivedData/Build/Products/Debug-iphonesimulator"
          zip -r PlayGrid-simulator.zip PlayGrid.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayGrid-simulator-${{ github.run_number }}
          path: ${{ runner.temp }}/DerivedData/Build/Products/Debug-iphonesimulator/PlayGrid-simulator.zip
          retention-days: 7
          if-no-files-found: error
